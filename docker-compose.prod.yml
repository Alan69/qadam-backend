services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - postgres
      - redis

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: always
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qadam}
      POSTGRES_USER: ${POSTGRES_USER:-qadam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
