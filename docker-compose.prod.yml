services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    restart: always
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-api.qadam-app.kz}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_volume:/srv/staticfiles:ro
      - media_volume:/srv/media:ro
    depends_on:
      - web

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qadam}
      POSTGRES_USER: ${POSTGRES_USER:-qadam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-qadam} -d $${POSTGRES_DB:-qadam}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:
