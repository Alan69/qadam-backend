name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install ruff
        run: uv pip install --system "ruff>=0.6"

      - name: ruff check
        run: ruff check src/

      - name: ruff format --check
        run: ruff format --check src/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qadam
          POSTGRES_USER: qadam
          POSTGRES_PASSWORD: qadam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qadam -d qadam"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ci-test-secret-key-not-used-anywhere-real
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://qadam:qadam@localhost:5432/qadam
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv pip install --system -r pyproject.toml --group dev

      - name: Run tests
        run: pytest --tb=short
